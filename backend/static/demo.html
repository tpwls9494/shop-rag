<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>챗봇 데모</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc; color: #1e293b; min-height: 100vh;
    }
    header {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 16px 32px; display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header p { font-size: 13px; color: #64748b; }
    .hero {
      max-width: 640px; margin: 80px auto; text-align: center; padding: 0 24px;
    }
    .hero h2 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    .hero p { color: #64748b; font-size: 16px; line-height: 1.6; }
    .badge {
      display: inline-block; margin-top: 24px;
      background: #eff6ff; color: #2563eb;
      padding: 8px 16px; border-radius: 20px; font-size: 14px;
    }
    .no-id {
      max-width: 400px; margin: 100px auto; text-align: center; padding: 32px;
      background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .no-id h2 { font-size: 18px; margin-bottom: 8px; }
    .no-id p { color: #64748b; font-size: 14px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const widgetId = params.get("id");
    const app = document.getElementById("app");

    if (!widgetId) {
      app.innerHTML = `
        <div class="no-id">
          <h2>위젯 ID가 없어요</h2>
          <p>URL에 <code>?id=위젯ID</code> 를 추가해주세요.</p>
        </div>
      `;
    } else {
      app.innerHTML = `
        <header>
          <div>
            <h1>쇼핑몰 챗봇 데모</h1>
            <p>오른쪽 하단 💬 버튼을 눌러 챗봇과 대화해보세요.</p>
          </div>
        </header>
        <div class="hero">
          <h2>AI 고객 상담 챗봇</h2>
          <p>상품 정보, 사이즈, 배송·반품 정책 등<br>무엇이든 질문해보세요.</p>
          <span class="badge">💬 오른쪽 하단 버튼을 클릭하세요</span>
        </div>
      `;

      const script = document.createElement("script");
      script.src = location.origin + "/widget.js";
      script.setAttribute("data-id", widgetId);
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
