<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>챗봇 데모</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #e2e8f0; min-height: 100vh;
    }
    header {
      background: #1e293b; border-bottom: 1px solid #334155;
      padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 700; color: #f1f5f9; }
    header p { font-size: 13px; color: #64748b; margin-top: 2px; }
    .badge {
      background: #1d4ed8; color: #bfdbfe;
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .hero {
      max-width: 600px; margin: 80px auto; text-align: center; padding: 0 24px;
    }
    .hero h2 { font-size: 30px; font-weight: 700; margin-bottom: 14px; color: #f1f5f9; }
    .hero p { color: #94a3b8; font-size: 16px; line-height: 1.7; }
    .hint {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 28px; background: #1e293b;
      border: 1px solid #334155; color: #94a3b8;
      padding: 10px 20px; border-radius: 24px; font-size: 14px;
    }
    .hint span { color: #60a5fa; }
    .legend {
      display: flex; gap: 20px; justify-content: center; margin-top: 16px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px; font-size: 13px; color: #64748b;
    }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .no-id {
      max-width: 400px; margin: 100px auto; text-align: center; padding: 32px;
      background: #1e293b; border-radius: 16px; border: 1px solid #334155;
    }
    .no-id h2 { font-size: 18px; margin-bottom: 8px; color: #f1f5f9; }
    .no-id p { color: #64748b; font-size: 14px; }
    code {
      background: #334155; padding: 2px 6px; border-radius: 4px;
      font-size: 13px; color: #93c5fd;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const widgetId = params.get("id");
    const app = document.getElementById("app");

    if (!widgetId) {
      app.innerHTML = `
        <div class="no-id">
          <h2>위젯 ID가 없어요</h2>
          <p>URL에 <code>?id=위젯ID</code> 를 추가해주세요.</p>
        </div>
      `;
    } else {
      app.innerHTML = `
        <header>
          <div>
            <h1>shop-rag 챗봇 데모</h1>
            <p>AI 고객 상담 챗봇 · RAG 기반 답변</p>
          </div>
          <span class="badge">Live Demo</span>
        </header>
        <div class="hero">
          <h2>무엇이든 물어보세요</h2>
          <p>셀러가 등록한 상품 정보, 사이즈, 배송·반품 정책 등<br>다양한 질문에 AI가 답변해드립니다.</p>
          <div class="hint">
            <span>💬</span> 오른쪽 하단 버튼을 클릭하세요
          </div>
          <div class="legend">
            <div class="legend-item">
              <div class="legend-dot" style="background:#60a5fa"></div>
              📚 문서 기반 답변 (RAG)
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:#94a3b8"></div>
              💬 일반 답변 (Direct)
            </div>
          </div>
        </div>
      `;

      const script = document.createElement("script");
      script.src = location.origin + "/widget.js";
      script.setAttribute("data-id", widgetId);
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
